<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div id="calculator" class="calculator">
        <div id="display" class="display" aria-live="polite">0</div>
        <div class="keypad">
            <!-- Row 1 -->
            <button class="btn" data-action="clear" aria-label="Clear">C</button>
            <button class="btn" data-action="backspace" aria-label="Backspace">←</button>
            <button class="btn" data-action="operator" data-value="/" aria-label="Divide">/</button>
            <button class="btn" data-action="operator" data-value="*" aria-label="Multiply">*</button>
            <!-- Row 2 -->
            <button class="btn" data-action="digit" data-value="7" aria-label="7">7</button>
            <button class="btn" data-action="digit" data-value="8" aria-label="8">8</button>
            <button class="btn" data-action="digit" data-value="9" aria-label="9">9</button>
            <button class="btn" data-action="operator" data-value="-" aria-label="Subtract">-</button>
            <!-- Row 3 -->
            <button class="btn" data-action="digit" data-value="4" aria-label="4">4</button>
            <button class="btn" data-action="digit" data-value="5" aria-label="5">5</button>
            <button class="btn" data-action="digit" data-value="6" aria-label="6">6</button>
            <button class="btn" data-action="operator" data-value="+" aria-label="Add">+</button>
            <!-- Row 4 -->
            <button class="btn" data-action="digit" data-value="1" aria-label="1">1</button>
            <button class="btn" data-action="digit" data-value="2" aria-label="2">2</button>
            <button class="btn" data-action="digit" data-value="3" aria-label="3">3</button>
            <button class="btn" data-action="equals" aria-label="Equals">=</button>
            <!-- Row 5 -->
            <button class="btn" data-action="digit" data-value="0" aria-label="0">0</button>
            <button class="btn" data-action="digit" data-value="." aria-label="Decimal point">.</button>
        </div>
    </div>
</body>
</html>
